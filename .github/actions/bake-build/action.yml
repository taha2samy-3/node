name: Bake Build and Push
description: Sets up QEMU, Buildx, logs into GHCR, and builds targets using Bake

inputs:
  targets:
    description: Targets to build from docker-bake.hcl
    required: true
  registry-username:
    description: Username for GitHub Container Registry
    required: true
  registry-token:
    description: Token for GitHub Container Registry
    required: true

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-token }}

    - name: Build and Push with Bake
      uses: docker/bake-action@v7
      env:
        DOCKER_BUILD_RECORD_RETENTION_DAYS: 2
        DOCKER_BUILD_RECORD_UPLOAD: false
      with:
        source: .
        files: |
          ./docker-bake.hcl
        targets: ${{ inputs.targets }}
        push: true