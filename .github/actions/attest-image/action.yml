name: Attest Image
description: Extracts digest, generates SBOM, and creates build provenance and SBOM attestations

inputs:
  image-name:
    description: Full image reference name without tag
    required: true
  image-tag:
    description: Target tag of the image
    required: true
  artifact-suffix:
    description: Suffix used to isolate SBOM output files
    required: true
  registry-username:
    description: Username for GitHub Container Registry
    required: true
  registry-token:
    description: Token for GitHub Container Registry
    required: true

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-token }}

    - name: Extract Image Digest
      id: get-digest
      shell: bash
      run: |
        digest=$(docker buildx imagetools inspect ${{ inputs.image-name }}:${{ inputs.image-tag }} --format '{{json .Manifest.Digest}}' | tr -d '"')
        echo "digest=$digest" >> "$GITHUB_OUTPUT"

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ inputs.image-name }}:${{ inputs.image-tag }}
        format: cyclonedx-json
        output-file: ${{ inputs.artifact-suffix }}.cyclonedx.json
        upload-artifact: false

    - name: Attest Build Provenance
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ inputs.image-name }}
        subject-digest: ${{ steps.get-digest.outputs.digest }}
        push-to-registry: true
        show-summary: false

    - name: Attest SBOM
      uses: actions/attest@v4
      with:
        subject-name: ${{ inputs.image-name }}
        subject-digest: ${{ steps.get-digest.outputs.digest }}
        predicate-path: ${{ inputs.artifact-suffix }}.cyclonedx.json
        predicate-type: https://cyclonedx.org/bom
        push-to-registry: true
        show-summary: false