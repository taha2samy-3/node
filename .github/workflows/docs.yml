name: Generate Security Docs and Deploy

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'main.py'
  workflow_run:
    workflows: ["Build and Push Images"]
    types:
      - completed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  
jobs:
  scan-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Node.js ---
          - { type: "node", version: "22", image: "ghcr.io/taha2samy-3/node:22-dev", v_out: "22-dev-vuln.json", c_out: "22-dev-cis.json" }
          - { type: "node", version: "22", image: "ghcr.io/taha2samy-3/node:22", v_out: "22-prod-vuln.json", c_out: "22-prod-cis.json" }
          - { type: "node", version: "24", image: "ghcr.io/taha2samy-3/node:24-dev", v_out: "24-dev-vuln.json", c_out: "24-dev-cis.json" }
          - { type: "node", version: "24", image: "ghcr.io/taha2samy-3/node:24", v_out: "24-prod-vuln.json", c_out: "24-prod-cis.json" }
          # --- Python ---
          - { type: "python", version: "3.10", image: "ghcr.io/taha2samy-3/python:3.10-dev", v_out: "3.10-dev-vuln.json", c_out: "3.10-dev-cis.json" }
          - { type: "python", version: "3.10", image: "ghcr.io/taha2samy-3/python:3.10", v_out: "3.10-prod-vuln.json", c_out: "3.10-prod-cis.json" }
          - { type: "python", version: "3.11", image: "ghcr.io/taha2samy-3/python:3.11-dev", v_out: "3.11-dev-vuln.json", c_out: "3.11-dev-cis.json" }
          - { type: "python", version: "3.11", image: "ghcr.io/taha2samy-3/python:3.11", v_out: "3.11-prod-vuln.json", c_out: "3.11-prod-cis.json" }
          - { type: "python", version: "3.12", image: "ghcr.io/taha2samy-3/python:3.12-dev", v_out: "3.12-dev-vuln.json", c_out: "3.12-dev-cis.json" }
          - { type: "python", version: "3.12", image: "ghcr.io/taha2samy-3/python:3.12", v_out: "3.12-prod-vuln.json", c_out: "3.12-prod-cis.json" }
          - { type: "python", version: "3.13", image: "ghcr.io/taha2samy-3/python:3.13-dev", v_out: "3.13-dev-vuln.json", c_out: "3.13-dev-cis.json" }
          - { type: "python", version: "3.13", image: "ghcr.io/taha2samy-3/python:3.13", v_out: "3.13-prod-vuln.json", c_out: "3.13-prod-cis.json" }
          - { type: "python", version: "3.14", image: "ghcr.io/taha2samy-3/python:3.14-dev", v_out: "3.14-dev-vuln.json", c_out: "3.14-dev-cis.json" }
          - { type: "python", version: "3.14", image: "ghcr.io/taha2samy-3/python:3.14", v_out: "3.14-prod-vuln.json", c_out: "3.14-prod-cis.json" }
          # --- Bun ---
          - { type: "bun", version: "1", image: "ghcr.io/taha2samy-3/bun:1-dev", v_out: "1-dev-vuln.json", c_out: "1-dev-cis.json" }
          - { type: "bun", version: "1", image: "ghcr.io/taha2samy-3/bun:1", v_out: "1-prod-vuln.json", c_out: "1-prod-cis.json" }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Security Scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ${{ matrix.image }}
          vuln_out: ${{ matrix.v_out }}
          cis_out: ${{ matrix.c_out }}
          artifact_name: "reports-${{ matrix.type }}-${{ matrix.version }}-${{ matrix.v_out }}"

  deploy-docs:
    needs: scan-images
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Download and Merge Reports
        uses: actions/download-artifact@v8
        with:
          path: reports
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Pipenv and Sync
        run: |
          pip install pipenv
          pipenv sync

      - name: Build and Deploy MkDocs
        run: pipenv run mkdocs build --clean

      - name: Push to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site