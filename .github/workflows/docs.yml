name: Generate Security Docs and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'main.py'
  workflow_dispatch:

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Scan Node 22 Dev
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd)/reports:/reports" aquasec/trivy image --format json --output /reports/22-dev-vuln.json ghcr.io/taha2samy-3/node:22-dev
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd)/reports:/reports" aquasec/trivy image --compliance docker-cis-1.6.0 --format json --output /reports/22-dev-cis.json ghcr.io/taha2samy-3/node:22-dev

      - name: Scan Node 22 Prod
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd)/reports:/reports" aquasec/trivy image --format json --output /reports/22-prod-vuln.json ghcr.io/taha2samy-3/node:22
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd)/reports:/reports" aquasec/trivy image --compliance docker-cis-1.6.0 --format json --output /reports/22-prod-cis.json ghcr.io/taha2samy-3/node:22

      - name: Scan Node 24 Dev
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd)/reports:/reports" aquasec/trivy image --format json --output /reports/24-dev-vuln.json ghcr.io/taha2samy-3/node:24-dev
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd)/reports:/reports" aquasec/trivy image --compliance docker-cis-1.6.0 --format json --output /reports/24-dev-cis.json ghcr.io/taha2samy-3/node:24-dev

      - name: Scan Node 24 Prod
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd)/reports:/reports" aquasec/trivy image --format json --output /reports/24-prod-vuln.json ghcr.io/taha2samy-3/node:24
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd)/reports:/reports" aquasec/trivy image --compliance docker-cis-1.6.0 --format json --output /reports/24-prod-cis.json ghcr.io/taha2samy-3/node:24

      - name: Build MkDocs Site
        run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site