name: Build and Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runtime: "node-22"
            targets: "dev-22,prod-22"
          - runtime: "node-24"
            targets: "dev-24,prod-24"
          - runtime: "python-3-10"
            targets: "python-dev-3-10,python-prod-3-10"
          - runtime: "python-3-11"
            targets: "python-dev-3-11,python-prod-3-11"
          - runtime: "python-3-12"
            targets: "python-dev-3-12,python-prod-3-12"
          - runtime: "python-3-13"
            targets: "python-dev-3-13,python-prod-3-13"
          - runtime: "python-3-14"
            targets: "python-dev-3-14,python-prod-3-14"
          - runtime: "bun-1"
            targets: "bun-dev-1,bun-prod-1"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Build Runtime Images
        uses: ./.github/actions/bake-build
        with:
          targets: ${{ matrix.targets }}
          registry-username: ${{ github.actor }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Cleanup Untagged Images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          delete-untagged: true

  attest:
    needs: cleanup
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - image: "ghcr.io/taha2samy-3/node"
            tag: "22-dev"
            suffix: "node-22-dev"
          - image: "ghcr.io/taha2samy-3/node"
            tag: "22"
            suffix: "node-22-prod"
          - image: "ghcr.io/taha2samy-3/node"
            tag: "24-dev"
            suffix: "node-24-dev"
          - image: "ghcr.io/taha2samy-3/node"
            tag: "24"
            suffix: "node-24-prod"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.10-dev"
            suffix: "python-3.10-dev"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.10"
            suffix: "python-3.10-prod"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.11-dev"
            suffix: "python-3.11-dev"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.11"
            suffix: "python-3.11-prod"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.12-dev"
            suffix: "python-3.12-dev"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.12"
            suffix: "python-3.12-prod"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.13-dev"
            suffix: "python-3.13-dev"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.13"
            suffix: "python-3.13-prod"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.14-dev"
            suffix: "python-3.14-dev"
          - image: "ghcr.io/taha2samy-3/python"
            tag: "3.14"
            suffix: "python-3.14-prod"
          - image: "ghcr.io/taha2samy-3/bun"
            tag: "1-dev"
            suffix: "bun-1-dev"
          - image: "ghcr.io/taha2samy-3/bun"
            tag: "1"
            suffix: "bun-1-prod"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Attest Runtime Image
        uses: ./.github/actions/attest-image
        with:
          image-name: ${{ matrix.image }}
          image-tag: ${{ matrix.tag }}
          artifact-suffix: ${{ matrix.suffix }}
          registry-username: ${{ github.actor }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM to GitHub Dependency Graph
        uses: ./.github/actions/upload-dependency-graph
        with:
          sbom-path: "${{ matrix.suffix }}.cyclonedx.json"
          target-name: ${{ matrix.suffix }}
          repo: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

